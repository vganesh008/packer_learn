name: packer
on:
    workflow_dispatch:
      inputs:
        Environment:
          description: Please Provide env for server image creation
          default: 
          type: choice
          required: true
          options:
            - dev
            - prod
        server_role:
          description:
          required: true
          default: false
          type: choice 
          options:
            - amazon-core
            - RHEL-core

run-name: 

jobs:
    setup:
      run-on: ubuntu:latest
      container: hashicorp/packer:light-1.15.1
      steps:
        - name: ${{ github.event.inputs.Environment }}
    packer_version:
      needs: setup
      runs-on: ubuntu:latest
      if: contains('dev', github.event.inputs.Environment)
      container: hashicorp/packer:light-1.15.1
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        - name: packer_plugin_install
          run: |
              packer --version
        - name: list all the files
          run: |
              ls -ltr packer
    

      

